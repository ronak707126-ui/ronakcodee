    <style>
         body{

            background-image:url("ron clothing.png");
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;

            display: flex;
            justify-content: center;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }

        .product{
            background-color: darkgray;
            border: 1px solid black;
            border-radius: 12px;
            width: 250px;
            padding: 12px;
            margin-bottom: 12px;

            text-align: center;
            box-shadow: 4px,4px,4px,white;
        }

        .product img{
            width: 250px;
            height: 190px;
            object-fit:cover;
            border-radius: 12px;
        }
        
        .product:hover{
            background-color: rgb(93, 41, 41);
            transition: 1s;
            transform: scale(1.02);
            color: white;

        }

        .product h2{
            border-bottom: 1px solid black;
        }

        .product button{
            background-color: aqua;
            border: none;
            padding: 10px;
            border-radius: 12px;
            width: 90%;

        }
    </style>
</head>
